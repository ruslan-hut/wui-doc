# Конфігурація застосунку WUI (значення за замовчуванням)
#
# Скопіюйте цей файл у configs/config.yaml та змініть за потреби.
# Змінні середовища мають пріоритет над значеннями YAML (імена змінних середовища показано в коментарях).
# Тривалості — у синтаксисі Go ("30s", "5m", "1h30m"); розміри — у байтах, якщо не вказано інше.

server:
  port: 8080                    # SERVER_PORT - TCP-порт, на якому слухає UI
  host: "127.0.0.1"             # SERVER_HOST - "127.0.0.1" лише локально; "0.0.0.0" - усі інтерфейси (доступ із LAN)
  read_timeout: 30s             # SERVER_READ_TIMEOUT
  write_timeout: 30s            # SERVER_WRITE_TIMEOUT
  no_browser: false             # SERVER_NO_BROWSER - встановіть true, щоб вимкнути автоматичне відкриття браузера

websocket:
  path: "/ws"                   # WS_PATH
  max_connections: 100          # WS_MAX_CONNECTIONS
  read_buffer_size: 1024        # WS_READ_BUFFER_SIZE (байти)
  write_buffer_size: 1024       # WS_WRITE_BUFFER_SIZE (байти)
  max_message_size: 524288      # WS_MAX_MESSAGE_SIZE (512KB)
  write_wait: 10s               # WS_WRITE_WAIT
  pong_wait: 60s                # WS_PONG_WAIT
  ping_period: 54s              # WS_PING_PERIOD (має бути < pong_wait)
  max_reconnect_attempts: 10    # WS_MAX_RECONNECT_ATTEMPTS
  reconnect_interval: 3s        # WS_RECONNECT_INTERVAL
  allowed_origins:              # WS_ALLOWED_ORIGINS (через кому)
    - "http://localhost:4200"
    - "http://localhost:8080"

webcheck:
  path: "C:\\ProgramData\\WebCheck"  # WC_PATH - каталог, що містить settings.ini / dat.ini та users.db

database:
  driver: "sqlite"              # DB_DRIVER
  dsn: "data/wui.db"           # DB_DSN
  max_open_conns: 25            # DB_MAX_OPEN_CONNS
  max_idle_conns: 5             # DB_MAX_IDLE_CONNS
  conn_max_lifetime: 5m         # DB_CONN_MAX_LIFETIME

pos:
  scan_interval: 30s            # POS_SCAN_INTERVAL
  timeout: 15s                  # POS_TIMEOUT - таймаут операції з базою даних
  retry_attempts: 3             # POS_RETRY_ATTEMPTS
  retry_backoff: 5s             # POS_RETRY_BACKOFF - затримка між повторними спробами запиту
  data_dir: "C:\\ProgramData\\WUI\\devices"  # POS_DATA_DIR
  log_dir: "C:\\ProgramData\\WUI\\logs"      # POS_LOG_DIR

ole:
  class_name: "WebCheckServer.ClassFiscal"  # OLE_CLASS_NAME
  timeout: 10s                  # OLE_TIMEOUT
  report_timeout: 60s           # OLE_REPORT_TIMEOUT
  use_mock: false               # OLE_USE_MOCK - true для розробки/тестування
  mock_delay: 3s                # OLE_MOCK_DELAY
  use_native_ole: false         # OLE_USE_NATIVE - лишайте false; підтримуваний шлях - cscript
  cscript_bitness: ""           # OLE_CSCRIPT_BITNESS - "" (за PATH), "32" (SysWOW64), "64" (System32); має збігатися з реєстрацією COM-сервера

license:
  enabled: true                 # LICENSE_HTTP_ENABLED
  url: "http://lic.webchek.com.ua/licxml"  # LICENSE_HTTP_URL
  timeout: 5s                   # LICENSE_HTTP_TIMEOUT

logging:
  level: "info"                 # LOG_LEVEL - debug, info, warn, error
  format: "text"                # LOG_FORMAT - json (продакшн), text (розробка)
  output: "stdout"              # LOG_OUTPUT - stdout, file, both
  file_path: "logs/wui.log"    # LOG_FILE_PATH
  max_size: 100                 # LOG_MAX_SIZE (МБ)
  max_backups: 3                # LOG_MAX_BACKUPS
  max_age: 28                   # LOG_MAX_AGE (дні)

# Вихідне з'єднання до relay-сервера WUI (віддалена підтримка).
# Коли увімкнено, екземпляр WUI набирає relay через постійний WebSocket і реєструє
# свої фіскальні номери; підтримка відкриває сесію за PIN-кодом зі сторінки Remote Access.
remote:
  enabled: false                # REMOTE_ENABLED
  server_url: "wss://web.che.ck.ua/api/v1/agent/ws"  # REMOTE_SERVER_URL - кінцева точка relay (шлях фіксований relay-сервером)
  tls:                          # клієнтський TLS-сертифікат (зарезервовано); лишайте порожнім за стандартного налаштування
    cert_file: ""               # TLS_CERT_FILE
    key_file: ""                # TLS_KEY_FILE
  auth:                         # необов'язковий bearer-токен; для звичайного сценарію не потрібен (доступ авторизується PIN-кодом)
    enabled: false              # AUTH_ENABLED
    token_secret: ""            # AUTH_TOKEN_SECRET

# Режим публічного демо-екземпляра. Вмикайте лише на виділеній машині з тестовими
# даними POS - демо-сесії не мають контролю доступу, а UI публічно доступний.
# Потребує remote.server_url та remote.auth.token_secret.
demo:
  enabled: false                # DEMO_ENABLED

# Контакти техпідтримки для блоку "ТЕХПІДТРИМКА" у шапці застосунку.
# Усі поля за замовчуванням порожні; UI приховує весь блок, якщо нічого не задано,
# і показує лише налаштовані контакти. Вкажіть тут власні канали зв'язку.
support:
  viber: ""                     # SUPPORT_VIBER - повний URL Viber (напр. "viber://chat?number=%2B380XXXXXXXXX")
  telegram: ""                  # SUPPORT_TELEGRAM - повний URL Telegram (напр. "https://t.me/yourbot")
  phone: ""                     # SUPPORT_PHONE - номер телефону для відображення (напр. "(095) 544 08 08")
